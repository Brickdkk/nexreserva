version: "3.9"

# Para exponer el webhook de Evolution API localmente durante desarrollo:
# 1. Instalar ngrok: https://ngrok.com/download
# 2. Correr en otra terminal: ngrok http 3000
# 3. Copiar la URL pública (ej: https://abc123.ngrok.io)
# 4. Configurar en Evolution API → Settings → Webhook URL:
#    https://abc123.ngrok.io/api/webhooks/whatsapp
#
# Variables requeridas en .env:
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
#   EVOLUTION_API_KEY
#   NEXT_PUBLIC_BASE_URL

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexreserva_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexreserva}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-nexreserva}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexreserva}"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution:
    image: atendai/evolution-api:v2.2.3
    container_name: nexreserva_evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # URL base de la API
      SERVER_URL: http://localhost:8080
      # Autenticación — usar EVOLUTION_API_KEY del .env
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-changeme}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: true
      # Base de datos (Evolution usa PostgreSQL)
      DATABASE_ENABLED: true
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER:-nexreserva}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-nexreserva}
      DATABASE_CONNECTION_CLIENT_NAME: evolution_api
      DATABASE_SAVE_DATA_INSTANCE: true
      DATABASE_SAVE_DATA_NEW_MESSAGE: true
      DATABASE_SAVE_MESSAGE_UPDATE: true
      DATABASE_SAVE_DATA_CONTACTS: true
      DATABASE_SAVE_DATA_CHATS: true
      # Webhook global (apunta al endpoint de Next.js)
      WEBHOOK_GLOBAL_URL: http://host.docker.internal:3000/api/webhooks/whatsapp
      WEBHOOK_GLOBAL_ENABLED: true
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: false
      # Log
      LOG_LEVEL: ERROR
      LOG_COLOR: true
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  evolution_instances:
  evolution_store:
